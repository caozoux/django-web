{% extends 'admin/layout.html' %}

{% block title %}添加网站 - 管理后台{% endblock %}

{% block content %}
<h2 class="mb-4">添加网站</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label">网站名称 *</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="url" class="form-label">网站URL *</label>
                    <input type="url" class="form-control" id="url" name="url" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">描述</label>
                <textarea class="form-control" id="description" name="description" rows="3"></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="category_id" class="form-label">分类 *</label>
                    <select class="form-select" id="category_id" name="category_id" required>
                        <option value="">请选择分类</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="status" class="form-label">状态</label>
                    <select class="form-select" id="status" name="status">
                        <option value="active">活跃</option>
                        <option value="pending">待审核</option>
                        <option value="inactive">停用</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="industry" class="form-label">行业</label>
                    <select class="form-select" id="industry" name="industry">
                        <option value="">请选择</option>
                        <option value="电商">电商</option>
                        <option value="社交">社交</option>
                        <option value="工具">工具</option>
                        <option value="资讯">资讯</option>
                        <option value="教育">教育</option>
                        <option value="娱乐">娱乐</option>
                        <option value="金融">金融</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="color_scheme" class="form-label">配色方案</label>
                    <select class="form-select" id="color_scheme" name="color_scheme">
                        <option value="">请选择</option>
                        <option value="cold">冷色调</option>
                        <option value="warm">暖色调</option>
                        <option value="neutral">中性色</option>
                        <option value="dark">暗色系</option>
                        <option value="colorful">多彩</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="layout_type" class="form-label">布局类型</label>
                    <select class="form-select" id="layout_type" name="layout_type">
                        <option value="">请选择</option>
                        <option value="centered">居中</option>
                        <option value="split">左右分栏</option>
                        <option value="fullscreen">全屏</option>
                        <option value="card">卡片式</option>
                        <option value="grid">网格</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="tags" class="form-label">标签（用逗号分隔）</label>
                <input type="text" class="form-control" id="tags" name="tags" placeholder="如：简约,现代,响应式">
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="{{ url_for('admin.websites') }}" class="btn btn-outline-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
