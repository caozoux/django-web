version: '3.8'

services:
  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/static:/var/www/static:ro
    depends_on:
      - flask
    networks:
      - webstyle_network
    restart: unless-stopped

  # Flask 应用
  flask:
    build: .
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://webstyle:webstyle123@postgres:5432/webstyle
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-key}
    depends_on:
      - postgres
      - redis
    networks:
      - webstyle_network
    volumes:
      - ./app/static/uploads:/app/app/static/uploads
      - ./logs:/app/logs
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    build: .
    command: celery -A app.celery_app worker -l info --concurrency=2
    environment:
      - DATABASE_URL=postgresql://webstyle:webstyle123@postgres:5432/webstyle
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    networks:
      - webstyle_network
    volumes:
      - ./app/static/uploads:/app/app/static/uploads
    restart: unless-stopped

  # Celery Beat (定时任务)
  celery-beat:
    build: .
    command: celery -A app.celery_app beat -l info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - webstyle_network
    restart: unless-stopped

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=webstyle
      - POSTGRES_USER=webstyle
      - POSTGRES_PASSWORD=webstyle123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webstyle_network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - webstyle_network
    restart: unless-stopped

  # Flower (Celery 监控)
  flower:
    build: .
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - webstyle_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  webstyle_network:
    driver: bridge
