    <script>
        let myChart = null;
        let myLineChart = null;
        let currentData = null;
        let trendWeight = 5; // 趋势权重（EMA周期）

        // 计算指数移动平均 (EMA)
        function calculateEMA(data, period) {
            const ema = [];
            const multiplier = 2 / (period + 1);

            // 第一天的EMA等于当天价格
            ema[0] = data[0];

            // 计算后续的EMA
            for (let i = 1; i < data.length; i++) {
                ema[i] = (data[i] - ema[i - 1]) * multiplier + ema[i - 1];
            }

            return ema;
        }

        async function queryStock() {
            const ticker = document.getElementById('tickerInput').value.trim();

            if (!ticker) {
                alert('请输入股票代码');
                return;
            }

            const loading = document.getElementById('loading');
            const errorContainer = document.getElementById('errorContainer');
            const dataContainer = document.getElementById('dataContainer');
            const queryBtn = document.getElementById('queryBtn');

            loading.style.display = 'block';
            errorContainer.innerHTML = '';
            queryBtn.disabled = true;

            try {
                const response = await fetch(`/stock/api/stock-price-data/${ticker}/`);
                const result = await response.json();

                loading.style.display = 'none';
                queryBtn.disabled = false;

                if (result.success) {
                    renderChart(result.data, result.ticker);
                } else {
                    errorContainer.innerHTML = `<div class="error-msg">${result.error}</div>`;
                    dataContainer.innerHTML = '<div class="no-data">暂无数据</div>';
                }
            } catch (error) {
                loading.style.display = 'none';
                queryBtn.disabled = false;
                errorContainer.innerHTML = `<div class="error-msg">查询失败: ${error.message}</div>`;
                dataContainer.innerHTML = '<div class="no-data">暂无数据</div>';
            }
        }

        function renderChart(data, ticker) {
            // 存储当前数据
            currentData = data;

            const container = document.getElementById('dataContainer');

            // 计算最新数据
            const lastIndex = data.close.length - 1;
            const prevIndex = lastIndex - 1 >= 0 ? lastIndex - 1 : 0;
            const currentPrice = data.close[lastIndex];
            const prevPrice = data.close[prevIndex];
            const change = currentPrice - prevPrice;
            const changePercent = (change / prevPrice * 100).toFixed(2);

            const trend = change > 0 ? 'up' : (change < 0 ? 'down' : 'flat');
            const trendText = change > 0 ? '涨' : (change < 0 ? '跌' : '平');

            container.innerHTML = `

                        <div class="info-value ${trend}">${currentPrice.toFixed(2)}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">涨跌幅</div>
                        <div class="info-value ${trend}">${changePercent}%</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">趋势</div>
                        <div class="info-value ${trend}">${trendText}</div>
                    </div>
                </div>

                    <div class="legend-item">
                        <div class="legend-color legend-up"></div>
                        <span>上涨 (红色)</span>
                    </div>
                    <div class="legend-item">

                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #f59e0b;"></div>
                        <span>MA5 (橙色)</span>
                    </div>

                        <span>MA10 (青色)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #8b5cf6;"></div>
                        <span>MA20 (紫色)</span>
                    </div>
                </div>

                <h3 style="text-align: center; margin: 30px 0 20px 0; color: #333;">K线图 + 收盘价曲线 + MA</h3>
                <div class="chart-container" id="priceChart"></div>

                <h3 style="text-align: center; margin: 40px 0 20px 0; color: #333;">股价线性图</h3>

                <div class="trend-control">
                    <div class="trend-label">📊 趋势权重</div>
                    <div class="trend-slider">
                        <input type="range" id="trendWeightSlider" min="1" max="50" step="1" value="5">
                    </div>
                    <div class="trend-value" id="trendWeightValue">5</div>
                </div>

                <div class="chart-container" id="lineChart"></div>

                <div style="margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px;">
                    <div style="margin-bottom: 10px; color: #495057;">
                        <strong>Python 代码编辑器：</strong>
                    </div>

                               style="padding: 8px 12px; border: 1px solid #ced4da; border-radius: 5px; width: 150px; flex: 1;">

                                           background: #2d2d2d; color: #f8f8f2; font-family: Courier New, monospace;
                                           font-size: 13px; line-height: 1.6; resize: vertical; font-weight: 500;">from stock.models import StockHistory

# 从数据库获取股票数据
ticker = "{TICKER_PLACEHOLDER}"  # 股票代码（从输入框获取）

    ticker=ticker
).order_by("trade_date")[:100]

data_list = list(history)
dates = [h.trade_date.strftime("%Y-%m-%d") for h in data_list]
close_prices = [float(h.close_price) for h in data_list]
high_prices = [float(h.high_price) for h in data_list]
low_prices = [float(h.low_price) for h in data_list]
volumes = [float(h.volume) for h in data_list]

# 自定义计算逻辑（示例：计算 SMA 和 EMA）
def calculate_sma(data, period=20):
    """计算简单移动平均"""
    sma = []
    for i in range(len(data)):
        if i < period - 1:
            sma.append(None)
        else:
            avg = sum(data[i-period+1:i+1]) / period
            sma.append(avg)
    return sma

def calculate_ema(data, period=20):
    """计算指数移动平均"""
    ema = []
    multiplier = 2 / (period + 1)
    ema.append(data[0])
    for i in range(1, len(data)):
        ema_value = (data[i] - ema[i-1]) * multiplier + ema[i-1]
        ema.append(ema_value)
    return ema

# 计算自定义指标
sma5 = calculate_sma(close_prices, 5)
sma20 = calculate_sma(close_prices, 20)
ema20 = calculate_ema(close_prices, 20)

# 定义输出数据（必须包含 dates 和 series 两个字段）
chart_data = {
    "dates": dates,

        {

            "data": ema20,
            "type": "line",
            "color": "#06b6d4",
            "smooth": True,
            "showSymbol": False
        }
    ]
}
</textarea>

                    <div id="codeOutput" style="margin-top: 15px; padding: 15px; background: #fff; border: 1px solid #e0e0e0; border-radius: 5px;

                    </div>

            `;

            // 初始化第一个图表

            const option = {

                },

                            if (seriesName === '收盘价' || seriesName === '开盘价') {
                                result += `${param.marker} ${seriesName}: ${value.toFixed(2)}<br/>`;
                            } else if (seriesName === '最高价') {
                                result += `${param.marker} ${seriesName}: ${value[1].toFixed(2)}<br/>`;
                            } else if (seriesName === '最低价') {
                                result += `${param.marker} ${seriesName}: ${value[2].toFixed(2)}<br/>`;
                            } else if (seriesName.startsWith('MA')) {
                                result += `${param.marker} ${seriesName}: ${value ? value.toFixed(2) : 'N/A'}<br/>`;
                            }
                        });

                        // 添加涨跌幅显示
                        const dataIndex = params[0].dataIndex;
                        if (dataIndex > 0 && data.close[dataIndex] !== undefined && data.close[dataIndex - 1] !== undefined) {

            }
            myLineChart = echarts.init(document.getElementById('lineChart'));

            // 计算趋势线（EMA）
            const trendData = calculateEMA(data.close, trendWeight);

            const lineOption = {
                title: {
                    text: `${ticker} 股价线性图`,
                    left: 'center',
                    top: 10
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'cross'
                    },
                    formatter: function(params) {
                        let result = params[0].axisValue + '<br/>';
                        params.forEach(param => {
                            result += `${param.marker} ${param.seriesName}: ${param.value.toFixed(2)}<br/>`;
                        });
                        return result;
                    }
                },
                legend: {
                    data: ['收盘价', `趋势(EMA${trendWeight})`],
                    top: 40
                },
                grid: {
                    left: '3%',
                    right: '3%',
                    bottom: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: data.dates,
                    boundaryGap: false,
                    axisLabel: {
                        rotate: 45,
                        fontSize: 10
                    }
                },
                yAxis: {
                    type: 'value',
                    scale: true,
                    name: '收盘价',
                    nameTextStyle: {
                        padding: [0, 0, 0, 20]
                    }
                },
                dataZoom: [
                    {
                        type: 'inside',
                        start: 50,
                        end: 100
                    },
                    {
                        type: 'slider',
                        start: 50,
                        end: 100,
                        height: 30
                    }
                ],
                series: [
                    {
                        name: '收盘价',
                        type: 'line',
                        data: data.close,
                        smooth: true,
                        itemStyle: {
                            color: '#667eea'
                        },
                        lineStyle: {
                            width: 2,
                            color: '#667eea'
                        },
                        showSymbol: false
                    },
                    {
                        name: `趋势(EMA${trendWeight})`,
                        type: 'line',
                        data: trendData,
                        smooth: true,
                        itemStyle: {
                            color: '#ff6b6b'
                        },
                        lineStyle: {
                            width: 3,
                            color: '#ff6b6b',
                            type: 'solid'
                        },
                        showSymbol: false
                    }
                ]
            };

            myLineChart.setOption(lineOption);

            // 趋势权重滑块事件
            document.getElementById('trendWeightSlider').addEventListener('input', function(e) {
                trendWeight = parseInt(e.target.value);
                document.getElementById('trendWeightValue').textContent = trendWeight;
                updateLineChart();
            });

            // 窗口大小变化时重绘图表
            window.addEventListener('resize', function() {
                myChart.resize();
                myLineChart.resize();
            });
        }

        // 更新线性图表的趋势线
        function updateLineChart() {
            if (!myLineChart || !currentData) {
                return;
            }

            // 重新计算趋势线
            const trendData = calculateEMA(currentData.close, trendWeight);

            // 更新图表配置
            const option = myLineChart.getOption();
            option.series[1].name = `趋势(EMA${trendWeight})`;
            option.series[1].data = trendData;
            option.legend[0].data[1] = `趋势(EMA${trendWeight})`;

            myLineChart.setOption(option);
        }

        // 支持回车键查询
        document.getElementById('tickerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                queryStock();
            }
        });

        // 自定义曲线图变量
        let myCustomChart = null;

        // 加载自定义曲线图
        // 运行自定义 Python 代码
        async function runCustomCode() {
            const ticker = document.getElementById("customTicker").value.trim();
            const code = document.getElementById("customCode").value.replace(/{TICKER_PLACEHOLDER}/g, ticker);
            const outputDiv = document.getElementById("codeOutput");

            if (!ticker) {
                alert("请输入股票代码");
                return;
            }

            if (!code.trim()) {
                alert("请输入 Python 代码");
                return;
            }

            // 显示输出区域
            outputDiv.style.display = "block";
            outputDiv.innerHTML = "<strong>正在执行代码...</strong><br/>";

            try {
                const response = await fetch("/stock/api/run-custom-code/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        ticker: ticker,
                        code: code
                    })
                });

                const result = await response.json();

                if (result.success) {
                    outputDiv.innerHTML = "<strong>✓ 代码执行成功！</strong><br/><br/>";
                    outputDiv.innerHTML += "输出：" + (result.output || "无") + "<br/><br/>";

                    // 渲染图表
                    renderCustomChart(result.data.dates, result.data.series);
                } else {
                    outputDiv.innerHTML = "<strong>✗ 执行失败：</strong><br/>" + result.error + "<br/><br/>";
                    if (result.traceback) {
                        outputDiv.innerHTML += "<strong>错误信息：</strong><br/>" + result.traceback;
                    }
                }
            } catch (error) {
                alert("请求失败：" + error.message);
                outputDiv.style.display = "block";
                outputDiv.innerHTML = "<strong>请求失败：</strong><br/>" + error.message;
            }
        }


        // 计算简单移动平均
        function calculateSMA(data, period) {
            const sma = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    sma.push(null);
                } else {
                    const sum = data.slice(i - period + 1, i + 1).reduce((a, b) => a + b, 0);
                    sma.push(sum / period);
                }
            }
            return sma;
        }

        // 渲染自定义图表
        function renderCustomChart(dates, series) {
            if (myCustomChart) {
                myCustomChart.dispose();
            }

            myCustomChart = echarts.init(document.getElementById('customChart'));

            const option = {
                title: {
                    text: '自定义曲线图',
                    left: 'center',
                    top: 10
                },
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'cross'
                    },
                    formatter: function(params) {
                        let result = params[0].axisValue + '<br/>';
                        params.forEach(param => {
                            if (param.value !== null && param.value !== undefined) {
                                result += `${param.marker} ${param.seriesName}: ${param.value.toFixed(2)}<br/>`;
                            }
                        });
                        return result;
                    }
                },
                legend: {
                    data: series.map(s => s.name),
                    top: 40
                },
                grid: {
                    left: '3%',
                    right: '3%',
                    bottom: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: dates,
                    boundaryGap: false,
                    axisLabel: {
                        rotate: 45,
                        fontSize: 10
                    }
                },
                yAxis: {
                    type: 'value',
                    scale: true,
                    name: '价格',
                    nameTextStyle: {
                        padding: [0, 0, 0, 20]
                    }
                },
                dataZoom: [
                    {
                        type: 'inside',
                        start: 50,
                        end: 100
                    },
                    {
                        type: 'slider',
                        start: 50,
                        end: 100,
                        height: 30
                    }
                ],
                series: series
            };

            myCustomChart.setOption(option);

            // 窗口大小变化时重绘图表
            window.addEventListener('resize', function() {
                if (myCustomChart) {
                    myCustomChart.resize();
                }
            });
        }
    </script>
</body>
